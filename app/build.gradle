plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.prim.texfit'
    compileSdk 36

    defaultConfig {
        applicationId "com.prim.texfit"
        minSdk 24
        targetSdk 36
        versionCode 1
        versionName "1.0"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    getProperty("archivesBaseName") // для старых версий или:
    base {
        archivesName = "texfit-v${defaultConfig.versionName}"
    }

    buildTypes {
        release {
            // "Уборка мусора" и сжатие:
            minifyEnabled true //  неиспользуемый код (R8)
            shrinkResources true //  неиспользуемые ресурсы
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'

            //  версии в имя APK
            applicationVariants.all { variant ->
                variant.outputs.all {
                    outputFileName = "texfit-v${variant.versionName}.apk"
                }
            }
        }
        debug {
            // Для отладки обычно сжатие отключают, чтобы сборка шла быстрее
            minifyEnabled false
            shrinkResources false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = '17'
    }
}

dependencies {
    implementation libs.androidx.core.ktx
    implementation libs.androidx.appcompat
    implementation libs.material
    implementation libs.androidx.media3.exoplayer
    implementation libs.androidx.media3.ui

    testImplementation libs.junit
    androidTestImplementation libs.androidx.junit
    androidTestImplementation libs.androidx.espresso.core
}